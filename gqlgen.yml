
schema:
  - schema/*.graphqls

exec:
  filename: internal/graph/generated.go
  package: graph


model:
  filename: internal/graph/model/models_gen.go
  package: model


resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"


models:
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
  RawEvent:
    model: github.com/DIMO-Network/cloudevent.RawEvent
  CloudEventHeader:
    model: github.com/DIMO-Network/cloudevent.CloudEventHeader
