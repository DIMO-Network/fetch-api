
schema:
  - schema/*.graphqls

exec:
  filename: internal/graph/generated.go
  package: graph


model:
  filename: internal/graph/model/models_gen.go
  package: model


resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"


directives:
  mcpTool:
    skip_runtime: true
  mcpExample:
    skip_runtime: true

models:
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
  JSON:
    model: github.com/DIMO-Network/fetch-api/internal/graph.RawJSON
  CloudEvent:
    model: github.com/DIMO-Network/fetch-api/internal/graph.CloudEventWrapper
  CloudEventHeader:
    model: github.com/DIMO-Network/cloudevent.CloudEventHeader
